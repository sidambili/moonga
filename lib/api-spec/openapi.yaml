openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Oncident API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: events
    description: Inbound operational events
  - name: sessions
    description: Agent sessions
  - name: artifacts
    description: Agent-produced artifacts for human review
  - name: integrations
    description: Integration configuration
  - name: webhooks
    description: Webhook ingest endpoints
  - name: dashboard
    description: Dashboard summary data
  - name: playbooks
    description: Agent playbooks (workflow instructions per objective)
  - name: skills
    description: Reusable knowledge snippets injected into every session

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Dashboard ──────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: High-level counts and recent activity
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Recent events and session updates
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/severity-breakdown:
    get:
      operationId: getSeverityBreakdown
      tags: [dashboard]
      summary: Event counts grouped by severity
      responses:
        "200":
          description: Severity breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SeverityCount"

  /dashboard/source-breakdown:
    get:
      operationId: getSourceBreakdown
      tags: [dashboard]
      summary: Event counts grouped by source
      responses:
        "200":
          description: Source breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SourceCount"

  # ── Events ────────────────────────────────────────────────────────
  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List all events
      parameters:
        - name: source
          in: query
          schema:
            type: string
        - name: severity
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: cursor
          in: query
          schema:
            type: integer
            description: ID of the last item from the previous page (for cursor pagination)
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventList"

  /events/{id}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get event by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404":
          description: Not found

  # ── AgentSessions ──────────────────────────────────────────────────────
  /agent-sessions:
    get:
      operationId: listAgentSessions
      tags: [agent-sessions]
      summary: List all agent sessions
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: cursor
          in: query
          schema:
            type: integer
            description: ID of the last item from the previous page (for cursor pagination)
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSessionList"

  /agent-sessions/{id}:
    get:
      operationId: getAgentSession
      tags: [agent-sessions]
      summary: Get session by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: AgentSession
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSession"
        "404":
          description: Not found

  /agent-sessions/{id}/retry:
    post:
      operationId: retryAgentSession
      tags: [agent-sessions]
      summary: Retry a failed session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: AgentSession updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSession"

  /agent-sessions/{id}/rerun:
    post:
      operationId: rerunAgentSession
      tags: [agent-sessions]
      summary: Rerun a session with identical input
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: New session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSession"

  /agent-sessions/{id}/escalate:
    post:
      operationId: escalateAgentSession
      tags: [agent-sessions]
      summary: Escalate a triage session to a deep Plan session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Plan session created (or existing open Plan session returned)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSession"

  /agent-sessions/{id}/mark-duplicate:
    post:
      operationId: markSessionDuplicate
      tags: [agent-sessions]
      summary: Mark the session's Linear ticket as a duplicate of another issue
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DuplicateMark"
      responses:
        "200":
          description: Ticket marked as duplicate in Linear
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DuplicateMarkResult"

  /agent-sessions/{id}/steps:
    get:
      operationId: getAgentSessionSteps
      tags: [agent-sessions]
      summary: Get reasoning steps for a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: AgentSession steps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentSessionStep"

  # ── Artifacts ─────────────────────────────────────────────────────
  /artifacts:
    get:
      operationId: listArtifacts
      tags: [artifacts]
      summary: List all artifacts
      parameters:
        - name: approval_state
          in: query
          schema:
            type: string
        - name: session_id
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: cursor
          in: query
          schema:
            type: integer
            description: ID of the last item from the previous page (for cursor pagination)
      responses:
        "200":
          description: List of artifacts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactList"

  /artifacts/{id}:
    get:
      operationId: getArtifact
      tags: [artifacts]
      summary: Get artifact by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Artifact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artifact"
        "404":
          description: Not found

  /artifacts/{id}/approve:
    post:
      operationId: approveArtifact
      tags: [artifacts]
      summary: Approve an artifact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Artifact approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artifact"

  /artifacts/{id}/reject:
    post:
      operationId: rejectArtifact
      tags: [artifacts]
      summary: Reject an artifact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Artifact rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artifact"

  /artifacts/{id}/edit:
    patch:
      operationId: editArtifact
      tags: [artifacts]
      summary: Edit artifact content
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArtifactEdit"
      responses:
        "200":
          description: Artifact edited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artifact"

  /artifacts/{id}/post-to-linear:
    post:
      operationId: postArtifactToLinear
      tags: [artifacts]
      summary: Post artifact content as a comment to the associated Linear issue
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Comment posted to Linear
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artifact"
        "400":
          description: No Linear ticket associated with this artifact
        "404":
          description: Artifact not found

  # ── Integrations ──────────────────────────────────────────────────
  /integrations:
    get:
      operationId: listIntegrations
      tags: [integrations]
      summary: List all integration configs
      responses:
        "200":
          description: List of integrations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Integration"

  /integrations/{provider}:
    get:
      operationId: getIntegration
      tags: [integrations]
      summary: Get integration config for a provider
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Integration config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Integration"
        "404":
          description: Not found

    put:
      operationId: upsertIntegration
      tags: [integrations]
      summary: Create or update an integration config
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntegrationInput"
      responses:
        "200":
          description: Integration saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Integration"

    delete:
      operationId: deleteIntegration
      tags: [integrations]
      summary: Delete an integration config
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /integrations/{provider}/repos:
    get:
      operationId: listIntegrationRepos
      tags: [integrations]
      summary: List repositories for the authenticated provider user
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of repositories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Repo"
        "404":
          description: Integration not found
        "400":
          description: No API key configured

  /integrations/{provider}/teams:
    get:
      operationId: listIntegrationTeams
      tags: [integrations]
      summary: List teams for the authenticated provider user (Linear only)
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of teams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LinearTeam"
        "404":
          description: Integration not found
        "400":
          description: Team listing is only supported for Linear
        "500":
          description: Failed to list teams
        "503":
          description: Linear is not configured or missing API key

  # ── Model settings ────────────────────────────────────────────────
  /model-settings:
    get:
      operationId: getModelSettings
      tags: [integrations]
      summary: Get model routing settings
      responses:
        "200":
          description: Model settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelSettings"

    put:
      operationId: updateModelSettings
      tags: [integrations]
      summary: Update model routing settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModelSettingsInput"
      responses:
        "200":
          description: Settings saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelSettings"

  # ── Projects ──────────────────────────────────────────────────────
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List projects in the active organization
      responses:
        "200":
          description: Projects + the caller's active project id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectList"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project in the active organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Rename a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectEdit"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}/activate:
    post:
      operationId: activateProject
      tags: [projects]
      summary: Switch the caller's active project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Active project switched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveProject"

  # ── Project sources ───────────────────────────────────────────────
  /project-sources:
    get:
      operationId: listProjectSources
      tags: [projects]
      summary: List external-resource bindings for projects in the active org
      responses:
        "200":
          description: Project sources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectSource"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createProjectSource
      tags: [projects]
      summary: Bind an external resource (Linear team / GitHub repo) to a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectSourceCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSource"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Source already mapped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /project-sources/{id}:
    delete:
      operationId: deleteProjectSource
      tags: [projects]
      summary: Remove a project source binding
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Source not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Playbooks ─────────────────────────────────────────────────────
  /playbooks:
    get:
      operationId: listPlaybooks
      tags: [playbooks]
      summary: List all playbooks
      responses:
        "200":
          description: Playbooks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Playbook"
    post:
      operationId: createPlaybook
      tags: [playbooks]
      summary: Create a user playbook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaybookCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Playbook"

  /playbooks/{id}:
    patch:
      operationId: updatePlaybook
      tags: [playbooks]
      summary: Update a playbook (system playbooks allow instructions + is_active only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaybookEdit"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Playbook"
        "400":
          description: Invalid request body
        "404":
          description: Playbook not found
    delete:
      operationId: deletePlaybook
      tags: [playbooks]
      summary: Delete a user playbook (system playbooks cannot be deleted)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "403":
          description: System playbooks cannot be deleted
        "404":
          description: Playbook not found

  # ── Skills ────────────────────────────────────────────────────────
  /skills:
    get:
      operationId: listSkills
      tags: [skills]
      summary: List all skills
      responses:
        "200":
          description: Skills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Skill"
    post:
      operationId: createSkill
      tags: [skills]
      summary: Create a user skill
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkillCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Skill"

  /skills/{id}:
    patch:
      operationId: updateSkill
      tags: [skills]
      summary: Update a skill
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkillEdit"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Skill"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "404":
          description: Skill not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteSkill
      tags: [skills]
      summary: Delete a user skill (system skills cannot be deleted)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: System skills cannot be deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Skill not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Webhook ingest ────────────────────────────────────────────────
  /webhooks/github:
    post:
      operationId: ingestGithubWebhook
      tags: [webhooks]
      summary: Receive GitHub webhook events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookPayload"
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookAck"

  /webhooks/linear:
    post:
      operationId: ingestLinearWebhook
      tags: [webhooks]
      summary: Receive Linear webhook events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookPayload"
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookAck"

  /webhooks/sentry:
    post:
      operationId: ingestSentryWebhook
      tags: [webhooks]
      summary: Receive Sentry webhook events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookPayload"
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookAck"

  /webhooks/betterstack:
    post:
      operationId: ingestBetterstackWebhook
      tags: [webhooks]
      summary: Receive Better Stack webhook events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookPayload"
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookAck"

  /webhooks/slack:
    post:
      operationId: ingestSlackWebhook
      tags: [webhooks]
      summary: Receive Slack webhook events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookPayload"
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookAck"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
        message:
          type: ["string", "null"]

    ValidationError:
      type: object
      required: [error, details]
      properties:
        error:
          type: string
        details:
          type: array
          items:
            type: object

    # ── Domain entities ──────────────────────────────────────────────

    Event:
      type: object
      required: [id, source, event_type, severity, status, created_at]
      properties:
        id:
          type: integer
        source:
          type: string
          description: "github | linear | betterstack | sentry | slack | email"
        event_type:
          type: string
          description: "error | anomaly | ticket_created | issue_updated | deploy_failed | push | pr_opened"
        severity:
          type: string
          description: "low | medium | high | critical"
        status:
          type: string
          description: "new | processing | processed | ignored"
        service:
          type: ["string", "null"]
        repo_id:
          type: ["string", "null"]
