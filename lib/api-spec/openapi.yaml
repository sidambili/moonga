      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Event"
        nextCursor:
          type: ["integer", "null"]
          description: ID to pass as `cursor` for the next page
        hasMore:
          type: boolean

    AgentSession:
      type: object
      required: [id, event_id, objective, status, created_at, updated_at]
      properties:
        id:
          type: integer
