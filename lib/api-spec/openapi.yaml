          description: Identifier (e.g. ENG-7) or UUID of the canonical issue. Defaults to the triage-detected duplicate_of.

    DuplicateMarkResult:
      type: object
      required: [ok, canonical_identifier]
      properties:
        ok:
          type: boolean
        canonical_identifier:
