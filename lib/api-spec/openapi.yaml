          type: ["boolean", "null"]
          description: Triage-only — guarded recommendation to escalate to a Plan session
        duplicate_of:
          type: ["string", "null"]
          description: Triage-only — identifier of the issue this duplicates, if any
        step_count:
          type: ["integer", "null"]
        total_tokens:
          type: ["integer", "null"]
        total_prompt_tokens:
          type: ["integer", "null"]
        total_completion_tokens:
          type: ["integer", "null"]
        total_cost:
          type: ["number", "null"]
        prompt_token_cost:
          type: ["number", "null"]
        completion_token_cost:
          type: ["number", "null"]
        cached_tokens:
          type: ["integer", "null"]
        cached_cost:
          type: ["number", "null"]
        tool_calls_count:
          type: ["integer", "null"]
        duration_ms:
          type: ["integer", "null"]
        playbook_id:
          type: ["integer", "null"]
        playbook_name:
          type: ["string", "null"]
        created_at:
          type: string
        updated_at:
          type: string
        event:
